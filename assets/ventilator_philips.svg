<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" fill="#0d1117"/>
  <!-- Fan body - slim tower -->
  <rect x="195" y="80" width="110" height="340" rx="30" fill="#d4d8e0"/>
  <rect x="200" y="85" width="100" height="330" rx="28" fill="#e8eaed"/>
  <!-- Control panel at top -->
  <rect x="205" y="95" width="90" height="60" rx="12" fill="#1a1a2e"/>
  <!-- Display -->
  <rect x="215" y="105" width="70" height="35" rx="6" fill="#0a0a1a"/>
  <text x="250" y="127" fill="#00d4ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">22°C</text>
  <!-- Touch buttons -->
  <circle cx="225" cy="148" r="6" fill="#333355"/>
  <circle cx="250" cy="148" r="6" fill="#ccff00"/>
  <circle cx="275" cy="148" r="6" fill="#333355"/>
  <!-- Grille lines - oscillation slots -->
  <rect x="208" y="175" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="185" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="195" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="205" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="215" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="225" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="235" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="245" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="255" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="265" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="275" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="285" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="295" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="305" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="315" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="325" width="84" height="3" rx="2" fill="#bbbec5"/>
  <rect x="208" y="335" width="84" height="3" rx="2" fill="#bbbec5"/>
  <!-- Philips logo area -->
  <text x="250" y="365" fill="#0050a0" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">PHILIPS</text>
  <!-- Base -->
  <ellipse cx="250" cy="420" rx="70" ry="14" fill="#d4d8e0"/>
  <ellipse cx="250" cy="420" rx="60" ry="10" fill="#e8eaed"/>
  <!-- Air flow animation hint -->
  <path d="M 130,200 Q 160,180 155,220 Q 150,260 130,240" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <path d="M 370,200 Q 340,180 345,220 Q 350,260 370,240" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <!-- Series badge -->
  <rect x="175" y="440" width="150" height="28" rx="6" fill="#0050a0" opacity="0.8"/>
  <text x="250" y="459" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Series 7000</text>
</svg>
